version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: lms_mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-lms_db}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USER:-user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms_backend
    restart: always
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://${DB_USER:-user}:${DB_PASSWORD:-password}@db:3306/${DB_NAME:-lms_db}
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      PORT: 3000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lms_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000

volumes:
  mysql_data:
